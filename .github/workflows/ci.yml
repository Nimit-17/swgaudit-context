name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mintlify-check:
    name: Mintlify broken-link check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        run: npm run check

      - name: Start local Mintlify server
        run: |
          npm run dev -- --port 3333 > /tmp/swgaudit-mint.log 2>&1 &
          echo $! > /tmp/swgaudit-mint.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3333/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/swgaudit-mint.log
          exit 1

      - name: Run smoke tests
        run: npm run smoke
