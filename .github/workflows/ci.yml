name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-check:
    name: Mintlify broken-link check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate static export
        run: bash scripts/check-static-export.sh

      - name: Start local static server
        run: |
          python3 -m http.server 3333 > /tmp/swgaudit-static.log 2>&1 &
          echo $! > /tmp/swgaudit-static.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3333/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/swgaudit-static.log
          exit 1

      - name: Run smoke tests
        run: BASE_URL=http://127.0.0.1:3333 bash scripts/smoke-test.sh
