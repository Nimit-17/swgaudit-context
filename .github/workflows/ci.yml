name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mintlify-check:
    name: Mintlify source and static export check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        run: npm run check

      - name: Start local Mintlify server
        run: |
          npm run dev -- --port 3333 > /tmp/swgaudit-mint.log 2>&1 &
          echo $! > /tmp/swgaudit-mint.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3333/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/swgaudit-mint.log
          exit 1

      - name: Run smoke tests
        run: npm run smoke

      - name: Export static v4 artifact
        run: npm run export:static

      - name: Start local static server
        working-directory: dist-static
        run: |
          python3 -m http.server 3334 > /tmp/swgaudit-static.log 2>&1 &
          echo $! > /tmp/swgaudit-static.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3334/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/swgaudit-static.log
          exit 1

      - name: Run static smoke tests
        run: BASE_URL=http://127.0.0.1:3334 npm run smoke

      - name: Run Selenium browser smoke tests
        run: BASE_URL=http://127.0.0.1:3334 npm run selenium
