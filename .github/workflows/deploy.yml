name: Deploy SWGAudit

on:
  workflow_dispatch:

concurrency:
  group: swgaudit-production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Mintlify source and static export
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        run: npm run check

      - name: Start local Mintlify server
        run: |
          npm run dev -- --port 3333 > /tmp/swgaudit-mint.log 2>&1 &
          echo $! > /tmp/swgaudit-mint.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3333/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/swgaudit-mint.log
          exit 1

      - name: Run smoke tests
        run: npm run smoke

      - name: Export static v4 artifact
        run: npm run export:static

      - name: Start local static server
        working-directory: dist-static
        run: |
          python3 -m http.server 3334 > /tmp/swgaudit-static.log 2>&1 &
          echo $! > /tmp/swgaudit-static.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3334/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/swgaudit-static.log
          exit 1

      - name: Run static smoke tests
        run: BASE_URL=http://127.0.0.1:3334 npm run smoke

      - name: Run Selenium browser smoke tests
        run: BASE_URL=http://127.0.0.1:3334 npm run selenium

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    timeout-minutes: 8

    steps:
      - name: Validate deploy secret
        run: |
          if [ -z "${{ secrets.SWGAUDIT_DEPLOY_KEY }}" ]; then
            echo "Missing GitHub Actions secret: SWGAUDIT_DEPLOY_KEY"
            exit 1
          fi

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SWGAUDIT_DEPLOY_KEY }}" > ~/.ssh/swgaudit_deploy_key
          chmod 600 ~/.ssh/swgaudit_deploy_key
          ssh-keygen -y -f ~/.ssh/swgaudit_deploy_key > ~/.ssh/swgaudit_deploy_key.pub
          expected_pub='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDCyJMWUviH2QvMOuHL4t5U9Igm7ImmvVPltjH/FdRwD swgaudit-github-actions-deploy'
          actual_pub="$(cat ~/.ssh/swgaudit_deploy_key.pub)"
          if [ "$actual_pub" != "$expected_pub" ]; then
            echo "SWGAUDIT_DEPLOY_KEY is present, but it is not the expected deploy private key."
            echo "Re-copy the full private key from /root/.ssh/swgaudit_github_actions_deploy."
            exit 1
          fi
          timeout 10 bash -c '</dev/tcp/64.227.129.152/22'
          ssh-keyscan -T 10 -p 22 64.227.129.152 >> ~/.ssh/known_hosts

      - name: Run server deploy script
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -i ~/.ssh/swgaudit_deploy_key -p 22 root@64.227.129.152 deploy-swgaudit-main
