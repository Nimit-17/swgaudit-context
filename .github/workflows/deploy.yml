name: Deploy SWGAudit

on:
  workflow_dispatch:

concurrency:
  group: swgaudit-production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify main before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        run: npm run check

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SWGAUDIT_DEPLOY_KEY }}" > ~/.ssh/swgaudit_deploy_key
          chmod 600 ~/.ssh/swgaudit_deploy_key
          ssh-keyscan -p 7575 167.71.228.73 >> ~/.ssh/known_hosts

      - name: Run server deploy script
        run: |
          ssh -i ~/.ssh/swgaudit_deploy_key -p 7575 root@167.71.228.73 deploy-swgaudit-main
