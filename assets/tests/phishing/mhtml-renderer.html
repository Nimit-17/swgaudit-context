<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SWG Audit MHTML Renderer</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: #f5f5f6;
      background: #030304;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .status {
      max-width: 560px;
      border-left: 3px solid #ff2538;
      padding: 1rem;
      color: #b3b3bc;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="status" id="status">Fetching server MHTML payload...</main>
  <script>
    const allowedPayloads = new Set([
      "/assets/tests/phishing/linkedin-login.mhtml",
      "/assets/tests/phishing/github-canvas.mhtml",
    ]);

    const extractHtmlFromMhtml = (mhtml) => {
      const match = mhtml.match(/Content-Type:\s*text\/html[^\r\n]*[\s\S]*?\r?\n\r?\n([\s\S]*?)\r?\n------SWGAuditDummyMhtmlBoundary--/i);
      return match ? match[1] : "";
    };

    const fail = (message) => {
      document.getElementById("status").textContent = message;
    };

    const params = new URLSearchParams(window.location.search);
    const source = params.get("src");

    if (!allowedPayloads.has(source)) {
      fail("MHTML renderer blocked an unknown payload source.");
    } else {
      fetch(source, {
        headers: {
          "Accept": "multipart/related,text/plain,*/*",
        },
      })
        .then((response) => {
          if (!response.ok) throw new Error(`MHTML fetch returned HTTP ${response.status}`);
          return response.text();
        })
        .then((mhtml) => {
          const html = extractHtmlFromMhtml(mhtml);
          if (!html) throw new Error("MHTML payload did not contain an HTML part");

          document.open();
          document.write(html);
          document.close();
        })
        .catch((error) => fail(`MHTML render failed: ${error.message}`));
    }
  </script>
</body>
</html>
